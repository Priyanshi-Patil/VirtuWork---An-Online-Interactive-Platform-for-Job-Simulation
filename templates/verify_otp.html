<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - VirtuWork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f5ff; --green: #00ff88; --purple: #8b5cf6; --bg: #020812; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        #matrix-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.15; }

        body::before {
            content: '';
            position: fixed;
            top: 30%; right: 15%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        .wrap { position: relative; z-index: 1; width: 100%; max-width: 460px; padding: 1rem; }

        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-name {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem; font-weight: 900;
            background: linear-gradient(135deg, var(--green), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            display: block; margin-bottom: 0.4rem;
        }
        .brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.25); }

        .card {
            background: rgba(0,255,136,0.02);
            border: 1px solid rgba(0,255,136,0.1);
            border-radius: 12px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
        }

        .corner { position: absolute; width: 12px; height: 12px; border-color: rgba(0,255,136,0.4); border-style: solid; }
        .tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
        .tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
        .bl { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
        .br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

        .card-title { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; color: white; text-align: center; margin-bottom: 0.75rem; }
        .card-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 2rem; }

        .otp-boxes { display: flex; gap: 0.75rem; justify-content: center; margin: 1.5rem 0; }
        .otp-box {
            width: 52px; height: 60px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,136,0.15);
            border-radius: 8px;
            text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem; font-weight: 700;
            color: var(--green);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .otp-box:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,255,136,0.08); }

        .error-msg {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem; color: #f87171;
            text-align: center; margin-bottom: 1rem;
        }

        .btn-submit {
            width: 100%; margin-top: 0.5rem; padding: 0.85rem; border-radius: 6px; border: none;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            color: #020812;
            font-family: 'Orbitron', monospace; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
            cursor: pointer; position: relative; overflow: hidden; transition: box-shadow 0.3s;
        }
        .btn-submit:hover { box-shadow: 0 0 30px rgba(0,255,136,0.4); }

        .resend-link { text-align: center; margin-top: 1.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: rgba(255,255,255,0.3); }
        .resend-link a { color: var(--green); text-decoration: none; }
        .resend-link a:hover { text-decoration: underline; }

        .timer { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: rgba(0,255,136,0.5); text-align: center; margin-top: 0.5rem; }

        /* Hidden real input */
        #otp-hidden { display: none; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="wrap">
        <div class="brand">
            <span class="brand-name">VirtuWork</span>
            <span class="brand-sub">// VERIFY_EMAIL.exe</span>
        </div>

        <div class="card">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <div class="card-title">EMAIL VERIFICATION</div>
            <div class="card-sub">
                A 6-digit code was sent to<br>
                <span style="color: var(--green);">{{ email }}</span>
            </div>

            {% if error %}
            <div class="error-msg">✖ {{ error }}</div>
            {% endif %}

            {% if messages %}
            {% for message in messages %}
            <div class="error-msg" style="color: var(--green);">✔ {{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'verify_otp' %}" id="otpForm">
                {% csrf_token %}
                <input type="hidden" name="otp" id="otp-hidden">

                <div class="otp-boxes">
                    <input type="text" maxlength="1" class="otp-box" id="d1" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" id="d2" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" id="d3" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" id="d4" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" id="d5" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" id="d6" inputmode="numeric">
                </div>

                <button type="submit" class="btn-submit">VERIFY CODE →</button>
            </form>

            <div class="resend-link">
                Didn't receive the code?
                <a href="{% url 'resend_otp' %}">Resend OTP</a>
            </div>
            <div class="timer" id="timer">Code expires in: <span id="countdown">10:00</span></div>
        </div>
    </div>

    <script>
        // Matrix rain
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = '01アイウエオ∑∆Ω#@!';
        const fontSize = 13;
        const cols = Math.floor(canvas.width / fontSize);
        const drops = Array(cols).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 8, 18, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drops.forEach((y, i) => {
                const char = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillStyle = i % 4 === 0 ? '#8b5cf6' : '#00ff88';
                ctx.font = fontSize + 'px monospace';
                ctx.fillText(char, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 55);

        // OTP box auto-jump
        const boxes = ['d1','d2','d3','d4','d5','d6'].map(id => document.getElementById(id));

        boxes.forEach((box, i) => {
            box.addEventListener('input', () => {
                if (box.value.length === 1 && i < 5) boxes[i + 1].focus();
                updateHidden();
            });
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
            });
        });

        function updateHidden() {
            document.getElementById('otp-hidden').value = boxes.map(b => b.value).join('');
        }

        // Auto-submit when all 6 filled
        boxes[5].addEventListener('input', () => {
            if (boxes.every(b => b.value)) {
                setTimeout(() => document.getElementById('otpForm').submit(), 300);
            }
        });

        // Paste support
        boxes[0].addEventListener('paste', (e) => {
            const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
            pasted.split('').forEach((char, i) => { if (boxes[i]) boxes[i].value = char; });
            updateHidden();
            boxes[Math.min(pasted.length, 5)].focus();
        });

        // Countdown timer
        let seconds = 600;
        const countdown = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            countdown.textContent = `${m}:${s}`;
            if (seconds <= 0) {
                clearInterval(timer);
                countdown.textContent = 'EXPIRED';
                countdown.style.color = '#f87171';
            }
        }, 1000);
    </script>
</body>
</html>
