<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — VirtuWork Pro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00f5ff;
      --magenta: #ff00ff;
      --green: #39ff14;
      --dark: #050510;
      --card: rgba(5, 5, 20, 0.85);
      --border: rgba(0, 245, 255, 0.25);
      --err: #ff4444;
    }

    body {
      min-height: 100vh;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      position: relative;
    }

    /* Matrix rain */
    canvas#matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.13;
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(18px);
      box-shadow: 0 0 40px rgba(0,245,255,0.08), 0 0 80px rgba(255,0,255,0.04);
    }

    .logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo span {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      color: rgba(0,245,255,0.45);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    h2 {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      color: var(--cyan);
      text-align: center;
      margin-bottom: 8px;
    }

    .desc {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(0,245,255,0.6);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="email"] {
      width: 100%;
      background: rgba(0,245,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="email"]:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 12px rgba(0,245,255,0.15);
    }

    .error-box {
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.4);
      border-radius: 8px;
      color: var(--err);
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 20px;
      text-align: center;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      color: #000;
      text-transform: uppercase;
      transition: opacity 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .btn:hover {
      opacity: 0.88;
      box-shadow: 0 0 20px rgba(0,245,255,0.3);
    }

    .footer-links {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }
    .footer-links a {
      color: var(--cyan);
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="card">
  <div class="logo"><span>VIRTUWORK PRO</span></div>
  <div class="subtitle">Password Recovery</div>

  <h2>Forgot Password?</h2>
  <p class="desc">Enter your account email and we'll send you a reset code.</p>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{% url 'forgot_password' %}">
    {% csrf_token %}
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus />
    </div>
    <button type="submit" class="btn">Send Reset Code</button>
  </form>

  <div class="footer-links">
    Remembered it? <a href="{% url 'login' %}">Back to Login</a>
  </div>
</div>

<script>
  // Matrix rain
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = Math.floor(canvas.width / 20);
  const drops = Array(cols).fill(1);
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*<>';
  function drawMatrix() {
    ctx.fillStyle = 'rgba(5,5,16,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00f5ff';
    ctx.font = '15px Share Tech Mono';
    drops.forEach((y, i) => {
      const char = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(char, i * 20, y * 20);
      if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }
  setInterval(drawMatrix, 40);
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>
</body>
</html>
